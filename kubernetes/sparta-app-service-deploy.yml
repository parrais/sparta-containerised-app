apiVersion: v1
kind: Service
metadata:
  name: sparta-app-svc
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
  selector:
    app: sparta-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparta-app-deployment
spec:
  selector:
    matchLabels:
      app: sparta-app
  template:
    metadata:
      labels:
        app: sparta-app
    spec:
      containers:
        - name: sparta-app
          image: mlewissparta/sparta-test-app:v1
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
          env:
            - name: DB_HOST
              value: mongodb://sparta-db-svc:27017/posts
